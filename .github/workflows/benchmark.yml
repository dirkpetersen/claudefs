name: Performance Benchmarks

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  benchmark:
    name: Benchmark Suite
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: '.'

      - name: Install benchmark tools
        run: |
          cargo install cargo-bench
          cargo install hyperfine

      - name: Run benchmarks
        run: cargo bench --no-run --verbose
        continue-on-error: true

      - name: Collect build metrics
        run: |
          {
            echo "# Build Metrics"
            echo ""
            echo "## Build Times"
            echo "- Debug: $(cargo build 2>&1 | grep 'Finished' | awk '{print $NF}')"
            echo "- Release: $(cargo build --release 2>&1 | grep 'Finished' | awk '{print $NF}')"
            echo ""
            echo "## Test Times"
            echo "- Unit tests: $(cargo test --lib 2>&1 | grep 'test result' | head -1)"
            echo ""
            echo "## Binary Sizes"
            ls -lh target/release/cfs* 2>/dev/null | awk '{print "- " $9 ": " $5}' || echo "- Build artifacts not available"
          } > metrics.txt
          cat metrics.txt

      - name: Store benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results-${{ github.run_number }}
          path: metrics.txt
          retention-days: 90

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const metrics = fs.readFileSync('metrics.txt', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## Performance Benchmark Results\n\n```\n' + metrics + '\n```'
            });
