name: CI Build & Clippy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'CHANGELOG.md'
      - 'README.md'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  # Build all crates
  build:
    name: Build Workspace
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache cargo registry and git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-deps-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-deps-

      - name: Cache cargo build (debug)
        uses: actions/cache@v4
        with:
          path: target/debug
          key: ${{ runner.os }}-cargo-debug-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-debug-

      - name: Cache cargo build (release)
        uses: actions/cache@v4
        with:
          path: target/release
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Build all crates (debug)
        run: cargo build --workspace --all-targets

      - name: Build all crates (release)
        run: cargo build --workspace --release

  # Format check
  fmt:
    name: Format Check (rustfmt)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt

      - name: Check code formatting
        run: cargo fmt --all -- --check

  # Linting with clippy (per-crate for faster CI)
  clippy:
    name: Lint Check (Clippy)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      matrix:
        crate: [
          claudefs-storage,
          claudefs-meta,
          claudefs-reduce,
          claudefs-transport,
          claudefs-fuse,
          claudefs-repl,
          claudefs-gateway,
          claudefs-mgmt,
          claudefs-tests
        ]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy

      - name: Cache cargo deps (clippy)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-deps-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-deps-

      - name: Cache cargo build (clippy)
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-clippy-

      - name: Run clippy on ${{ matrix.crate }} (debug)
        run: cargo clippy -p ${{ matrix.crate }} --all-targets -- -D warnings
        continue-on-error: false

      - name: Run clippy on ${{ matrix.crate }} (release)
        run: cargo clippy -p ${{ matrix.crate }} --all-targets --release -- -D warnings
        continue-on-error: false

  # Security audit
  security-audit:
    name: Security Audit (cargo-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit --deny warnings

  # Documentation check
  docs:
    name: Documentation Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache cargo deps (docs)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-deps-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-deps-

      - name: Cache cargo build (docs)
        uses: actions/cache@v4
        with:
          path: target/doc
          key: ${{ runner.os }}-cargo-docs-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-docs-

      - name: Build documentation
        run: cargo doc --no-deps --workspace
        env:
          RUSTDOCFLAGS: -D warnings
