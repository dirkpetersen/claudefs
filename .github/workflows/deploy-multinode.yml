name: Deploy Multi-Node Test Cluster

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'test'
        type: choice
        options:
          - test
          - staging
          - production
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - destroy
          - validate
  schedule:
    # Weekly multi-node test on Sunday at 02:00 UTC (after nightly tests)
    - cron: '0 2 * * 0'

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  AWS_REGION: us-west-2

jobs:
  # Validate cluster configuration before provisioning
  validate-terraform:
    name: Validate Terraform Configuration
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: '1.5.0'

      - name: Terraform Init
        working-directory: ./tools/terraform
        run: |
          terraform init -upgrade
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Terraform Validate
        working-directory: ./tools/terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: ./tools/terraform
        run: |
          terraform plan \
            -var="environment=${{ github.event.inputs.environment || 'test' }}" \
            -out=tfplan
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v3
        with:
          name: terraform-plan-${{ github.event.inputs.environment || 'test' }}
          path: ./tools/terraform/tfplan

  # Build release binary for cluster deployment
  build-release:
    name: Build Release Binary
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --bin cfs
        timeout-minutes: 45

      - name: Upload binary
        uses: actions/upload-artifact@v3
        with:
          name: cfs-release-binary
          path: target/release/cfs
          retention-days: 7

  # Provision AWS resources
  provision-cluster:
    name: Provision AWS Cluster
    runs-on: ubuntu-latest
    needs: validate-terraform
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.action == 'deploy'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: '1.5.0'

      - name: Download Terraform Plan
        uses: actions/download-artifact@v3
        with:
          name: terraform-plan-${{ github.event.inputs.environment }}
          path: ./tools/terraform/

      - name: Terraform Init
        working-directory: ./tools/terraform
        run: terraform init -upgrade
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Terraform Apply
        working-directory: ./tools/terraform
        run: terraform apply -auto-approve tfplan
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Extract Cluster Info
        working-directory: ./tools/terraform
        run: |
          terraform output -json > ../cluster-info.json
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Upload Cluster Info
        uses: actions/upload-artifact@v3
        with:
          name: cluster-info
          path: ./tools/cluster-info.json

  # Deploy binary and configuration to cluster nodes
  deploy-binary:
    name: Deploy Binary to Cluster
    runs-on: ubuntu-latest
    needs: [build-release, provision-cluster]
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.action == 'deploy'
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Download release binary
        uses: actions/download-artifact@v3
        with:
          name: cfs-release-binary
          path: ./target/release/

      - name: Download cluster info
        uses: actions/download-artifact@v3
        with:
          name: cluster-info
          path: ./tools/

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H github.com >> ~/.ssh/known_hosts

      - name: Deploy ClaudeFS
        run: |
          chmod +x tools/deploy-cluster.sh
          PROJECT_TAG="claudefs" \
          AWS_REGION="us-west-2" \
            ./tools/deploy-cluster.sh deploy --skip-build
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Start Services
        run: |
          PROJECT_TAG="claudefs" \
          AWS_REGION="us-west-2" \
            ./tools/deploy-cluster.sh start-services

      - name: Validate Deployment
        run: |
          PROJECT_TAG="claudefs" \
          AWS_REGION="us-west-2" \
            ./tools/deploy-cluster.sh validate

  # Run POSIX validation tests on deployed cluster
  posix-validation:
    name: POSIX Validation Tests
    runs-on: ubuntu-latest
    needs: deploy-binary
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.action == 'deploy'
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Download cluster info
        uses: actions/download-artifact@v3
        with:
          name: cluster-info
          path: ./tools/

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Run pjdfstest
        run: |
          # Extract FUSE client IP from cluster info
          FUSE_CLIENT_IP=$(jq -r '.fuse_client_ip.value' tools/cluster-info.json)
          ssh -i ~/.ssh/id_rsa ubuntu@${FUSE_CLIENT_IP} \
            'cd /home/ubuntu/claudefs && ./run-pjdfstest.sh'
        timeout-minutes: 60

      - name: Run fsx stress test
        run: |
          FUSE_CLIENT_IP=$(jq -r '.fuse_client_ip.value' tools/cluster-info.json)
          ssh -i ~/.ssh/id_rsa ubuntu@${FUSE_CLIENT_IP} \
            'cd /home/ubuntu/claudefs && ./run-fsx.sh'
        timeout-minutes: 30

      - name: Run xfstests
        run: |
          FUSE_CLIENT_IP=$(jq -r '.fuse_client_ip.value' tools/cluster-info.json)
          ssh -i ~/.ssh/id_rsa ubuntu@${FUSE_CLIENT_IP} \
            'cd /home/ubuntu/claudefs && ./run-xfstests.sh'
        timeout-minutes: 30

      - name: Collect test results
        if: always()
        run: |
          FUSE_CLIENT_IP=$(jq -r '.fuse_client_ip.value' tools/cluster-info.json)
          ssh -i ~/.ssh/id_rsa ubuntu@${FUSE_CLIENT_IP} \
            'tar czf /tmp/test-results.tar.gz /var/log/claudefs/tests/ && exit 0'
          scp -i ~/.ssh/id_rsa ubuntu@${FUSE_CLIENT_IP}:/tmp/test-results.tar.gz ./test-results.tar.gz

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: posix-test-results
          path: ./test-results.tar.gz

  # Cluster health check
  cluster-health:
    name: Cluster Health Check
    runs-on: ubuntu-latest
    needs: deploy-binary
    if: |
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.action == 'deploy' || github.event.inputs.action == 'validate')
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Download cluster info
        uses: actions/download-artifact@v3
        with:
          name: cluster-info
          path: ./tools/

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Run health check
        run: |
          chmod +x tools/cluster-health-check.sh
          PROJECT_TAG="claudefs" \
          AWS_REGION="us-west-2" \
            ./tools/cluster-health-check.sh
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  # Destroy cluster (optional)
  destroy-cluster:
    name: Destroy Cluster
    runs-on: ubuntu-latest
    needs: validate-terraform
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.action == 'destroy'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: '1.5.0'

      - name: Terraform Init
        working-directory: ./tools/terraform
        run: terraform init -upgrade
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Terraform Destroy
        working-directory: ./tools/terraform
        run: |
          terraform destroy -auto-approve \
            -var="environment=${{ github.event.inputs.environment }}"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  # Slack notification
  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: [posix-validation, cluster-health]
    if: always()
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "ClaudeFS Multi-Node Deployment ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*ClaudeFS Multi-Node Deployment*\nEnvironment: ${{ github.event.inputs.environment || 'test' }}\nAction: ${{ github.event.inputs.action || 'validate' }}\nStatus: ${{ job.status }}"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "View on GitHub: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
        if: always()
