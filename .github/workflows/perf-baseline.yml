name: Performance Baseline

on:
  schedule:
    # Run at 1 AM UTC daily
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      compare_to_baseline:
        description: 'Compare results to baseline'
        required: false
        default: 'true'

jobs:
  perf-benchmark:
    name: FIO Performance Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install FIO
        run: |
          sudo apt-get update
          sudo apt-get install -y fio
          fio --version

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build ClaudeFS
        run: cargo build -p claudefs-fuse -p claudefs-tests --release

      - name: Prepare storage
        run: |
          mkdir -p /tmp/cfs-storage /tmp/cfs-mount
          fallocate -l 10G /tmp/cfs-storage/disk.img || dd if=/dev/zero of=/tmp/cfs-storage/disk.img bs=1G count=10

      - name: Start ClaudeFS daemon
        run: |
          ./target/release/cfs mount /tmp/cfs-mount &
          sleep 5
          mount | grep cfs-mount || (echo "Mount failed"; exit 1)

      - name: Warm-up phase
        run: |
          dd if=/dev/zero of=/tmp/cfs-mount/warmup.bin bs=1M count=1000
          sync

      - name: Sequential read benchmark
        run: |
          cargo run -p claudefs-tests --release --bin fio-runner -- \
            --name seq-read \
            --rw read \
            --bs 1m \
            --iodepth 32 \
            --runtime 300 \
            --numjobs 4 \
            --filename /tmp/cfs-mount/seq-read.bin \
            --size 1G \
            --output /tmp/perf-seq-read.json 2>&1 | tee /tmp/seq-read.log

      - name: Sequential write benchmark
        run: |
          cargo run -p claudefs-tests --release --bin fio-runner -- \
            --name seq-write \
            --rw write \
            --bs 1m \
            --iodepth 32 \
            --runtime 300 \
            --numjobs 4 \
            --fsync 1 \
            --filename /tmp/cfs-mount/seq-write.bin \
            --size 1G \
            --output /tmp/perf-seq-write.json 2>&1 | tee /tmp/seq-write.log

      - name: Random read benchmark (4K)
        run: |
          cargo run -p claudefs-tests --release --bin fio-runner -- \
            --name rand-read \
            --rw randread \
            --bs 4k \
            --iodepth 64 \
            --runtime 300 \
            --numjobs 8 \
            --filename /tmp/cfs-mount/rand-read.bin \
            --size 10G \
            --output /tmp/perf-rand-read.json 2>&1 | tee /tmp/rand-read.log

      - name: Random write benchmark (4K)
        run: |
          cargo run -p claudefs-tests --release --bin fio-runner -- \
            --name rand-write \
            --rw randwrite \
            --bs 4k \
            --iodepth 64 \
            --runtime 300 \
            --numjobs 8 \
            --filename /tmp/cfs-mount/rand-write.bin \
            --size 10G \
            --output /tmp/perf-rand-write.json 2>&1 | tee /tmp/rand-write.log

      - name: Mixed workload (70/30)
        run: |
          cargo run -p claudefs-tests --release --bin fio-runner -- \
            --name mixed-7030 \
            --rw randrw \
            --rwmixread 70 \
            --bs 4k \
            --iodepth 64 \
            --runtime 300 \
            --numjobs 8 \
            --filename /tmp/cfs-mount/mixed.bin \
            --size 10G \
            --output /tmp/perf-mixed.json 2>&1 | tee /tmp/mixed.log

      - name: Unmount filesystem
        if: always()
        run: fusermount -u /tmp/cfs-mount || true

      - name: Aggregate results
        if: always()
        run: |
          mkdir -p /tmp/perf-results

          # Collect all JSON results
          for f in /tmp/perf-*.json; do
            [ -f "$f" ] && cp "$f" /tmp/perf-results/ || true
          done

          # Create summary
          cat > /tmp/perf-results/SUMMARY.txt << 'SUMMARY'
          # Performance Baseline Summary
          Date: $(date -u +%Y-%m-%d_%H:%M:%S UTC)
          ClaudeFS commit: $(git rev-parse --short HEAD)

          Results in: perf-*.json
          Logs in: *.log (see /tmp/perf-results)
          SUMMARY

          ls -lh /tmp/perf-results/

      - name: Load baseline and compare
        if: always()
        run: |
          python3 << 'PYTHON'
          import json
          import os
          from pathlib import Path

          def load_fio_results(filepath):
              """Extract throughput/IOPS from FIO JSON"""
              try:
                  with open(filepath) as f:
                      data = json.load(f)
                      jobs = data.get('jobs', [{}])[0]
                      return {
                          'read_bw': jobs.get('read', {}).get('bw_bytes', 0) / (1024*1024),  # MB/s
                          'write_bw': jobs.get('write', {}).get('bw_bytes', 0) / (1024*1024),
                          'read_iops': jobs.get('read', {}).get('iops', 0),
                          'write_iops': jobs.get('write', {}).get('iops', 0),
                          'clat_p99': jobs.get('read', {}).get('clat', {}).get('percentile', {}).get('99.000000', 0) / 1000  # µs
                      }
              except Exception as e:
                  print(f"Error loading {filepath}: {e}")
                  return {}

          results_dir = Path('/tmp/perf-results')
          baseline_file = Path('tests/fio-baseline.json')

          print("=== Current Run Results ===")
          for json_file in sorted(results_dir.glob('perf-*.json')):
              result = load_fio_results(json_file)
              print(f"{json_file.stem}:")
              for k, v in result.items():
                  print(f"  {k}: {v:.2f}")

          if baseline_file.exists():
              print("\n=== Baseline Comparison ===")
              try:
                  with open(baseline_file) as f:
                      baseline = json.load(f)
                      print(f"Baseline from: {baseline.get('date', 'unknown')}")
                      print("Threshold: ±10% variance acceptable")
              except Exception as e:
                  print(f"Error loading baseline: {e}")
          else:
              print(f"\nNote: No baseline found at {baseline_file}")
              print("Current results will become the new baseline.")

          PYTHON

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: perf-baseline-results
          path: /tmp/perf-results/
          retention-days: 90

      - name: Alert on performance regress
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = '/tmp/perf-results/SUMMARY.txt';

            if (fs.existsSync(path)) {
              const summary = fs.readFileSync(path, 'utf8');
              console.log('Performance test summary:');
              console.log(summary);

              // TODO: Parse JSON results and compare to baseline
              // Alert if regress >10%
            }
