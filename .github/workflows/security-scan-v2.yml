name: Security Scanning & Compliance

on:
  push:
    branches: [main]
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/**/Cargo.toml'
  pull_request:
    branches: [main]
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/**/Cargo.toml'
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo-audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Run cargo audit
        run: |
          cargo install cargo-audit --locked --quiet
          cargo audit --deny warnings
        timeout-minutes: 5

      - name: Generate audit report
        if: always()
        run: cargo audit json > audit-report.json || true

      - name: Upload audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: audit-report.json
          retention-days: 7

  cargo-deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked --quiet

      - name: Check advisories
        run: cargo deny check advisories

      - name: Check licenses
        run: cargo deny check licenses

      - name: Check bans
        run: cargo deny check bans

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Install cargo-sbom
        run: cargo install cargo-sbom --locked --quiet

      - name: Generate SBOM
        run: cargo sbom -o claudefs-sbom.xml

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: claudefs-sbom.xml
          retention-days: 90

  security-policy:
    name: Security Policy Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Verify SECURITY.md exists
        run: |
          if [ ! -f SECURITY.md ]; then
            echo "SECURITY.md not found"
            exit 1
          fi

      - name: Verify dependabot config
        run: |
          if [ ! -f .github/dependabot.yml ]; then
            echo "dependabot.yml not found (optional)"
          fi