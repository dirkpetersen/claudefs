name: Unit Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          toolchain: stable
          components: rustfmt,clippy

      - name: Cache Cargo
        uses: ./.github/actions/cache-cargo
        with:
          cache-target-debug: true
          cache-target-release: false

      - name: Run unit tests
        run: |
          cargo test --lib --all --message-format=json 2>&1 | tee test-results.json || TEST_FAILED=1
          exit ${TEST_FAILED:-0}
        timeout-minutes: 25
        continue-on-error: true

      - name: Convert to JUnit XML
        if: always()
        run: |
          if command -v cargo2junit &> /dev/null; then
            cargo2junit < test-results.json > target/test-results.xml 2>/dev/null || true
          else
            echo "cargo2junit not available, creating placeholder"
            echo '<?xml version="1.0" encoding="UTF-8"?><testsuites></testsuites>' > target/test-results.xml
          fi
        continue-on-error: true

      - name: Report results
        if: always()
        uses: ./.github/actions/test-reporter
        with:
          test-type: junit
          fail-on-error: true
          name: Unit Test Results
          artifact-name: unit-test-results
          artifact-retention-days: 7