# cargo-deny configuration for ClaudeFS
# See: https://embarkstudios.github.io/cargo-deny/

[advisories]
# The path where the advisory database is cloned/fetched into
db-path = "$CARGO_HOME/advisory-db"
# The url(s) of the advisory databases to use
db-urls = ["https://github.com/rustsec/advisory-db/raw/main/db.json.gz"]
# How to handle crates with security vulnerabilities
vulnerability = "deny"
# How to handle unmaintained crates
unmaintained = "warn"
# How to handle crates that have been yanked from crates.io
yanked = "warn"
# How to handle crates with security notices
notice = "warn"
# A list of advisory IDs to ignore
# Example: ignore = ["RUSTSEC-2020-0001"]
ignore = []

[licenses]
# The lint level for crates which do not have a detectable license
unlicensed = "deny"
# List of explicitly allowed licenses
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 OR MIT",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-DFS-2016",
  "MPL-2.0",
]
# List of explicitly disallowed licenses
deny = [
  "GPL-2.0",
  "GPL-3.0",
  "AGPL-3.0",
]
# Lint level for licenses considered copyleft
copyleft = "warn"
# Blanket approval or denial for OSI-approved or FSF Free/Libre licenses
allow-osi-fsf-free = "both"
# Lint level used when no other predicates are matched
default = "deny"
# The confidence threshold for detecting a license from license text.
confidence-threshold = 0.8

# Some crates have multiple licenses with different confidence thresholds,
# so this may result in fuzzy matches
allow-unknown = false

# Lint level for when dependencies do not declare either `license` or
# `license-file`
private = { ignore = true }

[bans]
# Lint level for when multiple versions of the same crate are detected
multiple-versions = "warn"
# Lint level for when an unmaintained crate is detected
unmaintained = "warn"
# Lint level for when a deprecated crate is detected
deprecated = "warn"
# Lint level for when a crate with security vulnerabilities is detected
vulnerable = "deny"
# A list of packages that will be skipped from duplicate version checks.
allow = [
  #{ name = "ansi_term", version = "=0.11.0" },
]
# A list of explicitly disallowed duplicate versions.
deny = [
  # Each entry the name of a crate and a version range. If multiple versions
  # of the crate in the dependency tree match the version range, all of them
  # will be reported as a violation
  #{ name = "ansi_term", version = "=0.11.0" },
]
# Certain crates/versions that will be skipped when doing duplicate detection.
skip = [
  #{ name = "ansi_term", version = "=0.11.0" },
]
# Similarly named crates that are allowed to coexist
skip-tree = [
  #{ name = "windows-sys", version = "=0.42.0" },
]

[sources]
# Lint level for what to happen when a crate from a crate registry that is not in the allow list is detected
unknown-registry = "warn"
# Lint level for what to happen when a crate from a git repository that is not in the allow list is detected
unknown-git = "warn"
# List of allowed crate registries
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# List of allowed Git repositories
allow-git = []
